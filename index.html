<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Rozvrh tělocviku</title>
  <style>
    body{font-family: Arial, Helvetica, sans-serif; padding:20px; background:#f9f9f9}
    .layout{display:flex; flex-direction:column; gap:20px; align-items:center}
    h1{color:#333}
    .timetable-container{width:940px}
    .timetable-grid{display:grid; grid-template-columns: 120px repeat(5, 1fr) 80px; gap:8px; align-items:stretch}
    .timetable-grid .corner{background:transparent}
    .timetable-grid .day{font-weight:bold; text-align:center; background:#e8f4f8; padding:8px; border-radius:4px}
    .timetable-grid .time{font-weight:bold; display:flex; align-items:center; justify-content:center; background:#f0f0f0; padding:8px; border-radius:4px}
    .timetable-grid .rowcount{font-weight:bold; text-align:center; background:#fffacd; display:flex; align-items:center; justify-content:center; padding:8px; border-radius:4px; font-size:0.9rem}
    .timetable-grid .colcount-header{background:transparent}
    .timetable-grid .colcount{font-weight:bold; text-align:center; background:#fffacd; display:flex; align-items:center; justify-content:center; padding:8px; border-radius:4px; font-size:0.9rem}
    .slot{min-height:60px; border:2px dashed #ccc; display:flex; align-items:center; justify-content:center; background:#fff; border-radius:4px; padding:4px; flex-wrap:wrap; overflow-y:auto}
    .slot.filled{border-style:solid; background:#e8f5e9; border-color:#4caf50}
    .slot-item{padding:2px 4px; margin:1px; border-radius:3px; font-size:0.85rem; font-weight:bold}
    .slot-class{color:#333; font-weight:bold; margin-bottom:4px}
    .slot-teachers{display:flex; gap:4px; flex-wrap:wrap; justify-content:center; font-size:0.75rem; color:#333}
    .teacher-chip{padding:2px 4px; border-radius:4px; color:#fff; font-size:0.75rem; font-weight:bold}
    .pool{width:940px; display:flex; flex-direction:column; gap:12px}
    #cards{display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-start}
    .card{padding:8px 12px; background:#f5f5f5; border:2px solid #ddd; cursor:grab; display:flex; flex-direction:column; gap:4px; width:160px; box-sizing:border-box; border-radius:4px}
    .card.dragging{opacity:0.5}
    .card_class{font-weight:bold; font-size:1rem}
    .card_teachers{display:flex; gap:4px; flex-wrap:wrap; font-size:0.9rem}
    .controls{margin-top:12px}
    button{padding:6px 10px; background:#2196f3; color:white; border:none; border-radius:4px; cursor:pointer}
    button:hover{background:#1976d2}
  </style>
</head>
<body>
  <h1>Rozvrh tělocviku (přetáhněte kartičky)</h1>
  <div class="layout">
    <div class="timetable-container">
      <h3>TABULKA</h3>
      <div class="timetable-grid" id="timetable">
        <!-- generated by JS -->
      </div>
    </div>
    <div class="pool">
      <h3>Vyučování</h3>
      <div id="cards"></div>
      <div class="controls">
        <button id="reset">Resetovat</button>
      </div>
    </div>
  </div>

  <script>
    const data = JSON.parse('[{"id": 0, "label": "Ia — Up, Ne"}, {"id": 1, "label": "Ib — Bz, Rj"}, {"id": 2, "label": "IIa, IIb — Ne, Ga, Rj"}, {"id": 3, "label": "IIIa,IIIb — Ga, Bz, Ne"}, {"id": 4, "label": "IVa — Bz, Rj"}, {"id": 5, "label": "IVb — Bz, Rj"}, {"id": 6, "label": "Va — Bz, Rj"}, {"id": 7, "label": "Vb — Sf, Ne"}, {"id": 8, "label": "VIa — Bz, Rj"}, {"id": 9, "label": "VIb — Ga, Ne"}, {"id": 10, "label": "VIIa — Sf, Ka"}, {"id": 11, "label": "VIIb — Sf, Rj"}, {"id": 12, "label": "VIIIa, VIIIb — Up, Ga, Ne"}, {"id": 13, "label": "1a, 1b — Ga, Bz, Ne"}, {"id": 14, "label": "2a, 2b — Bz, Ga, Ne"}, {"id": 15, "label": "3a — Ka, Sf"}, {"id": 16, "label": "3b — Ga, Ne"}, {"id": 17, "label": "4a — Bz, Ne"}, {"id": 18, "label": "4b — Ka, Ne"}]');
    
    const cols = 5;
    const rows = 4;
    const slotCount = cols * rows;
    const disabledIndex = slotCount - 1;
    const days = ['Pondělí','Úterý','Středa','Čtvrtek','Pátek'];
    const times = ['1.-2.','3.-4.','5.-6.','7.-8.'];
    
    const cardsEl = document.getElementById('cards');
    const used = new Set();
    const slotMap = {};

    const teacherColors = {};
    const colors = ['#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#98D8C8','#F7DC6F','#BB8FCE','#85C1E2','#F8B88B','#A8E6CF','#FFD3B6','#FFAAA5','#AA96DA','#FCBAD3','#A8D8EA'];
    let colorIdx = 0;
    data.forEach(item => {
      const [_, teachersText] = item.label.split(' — ');
      if (teachersText) {
        const teachers = teachersText.split(', ');
        teachers.forEach(t => {
          if (!teacherColors[t]) {
            teacherColors[t] = colors[colorIdx % colors.length];
            colorIdx++;
          }
        });
      }
    });

    function createTeacherChips(teachersText){
      const wrapper = document.createElement('div');
      wrapper.className = 'slot-teachers';
      const teachers = (teachersText || '').split(', ');
      teachers.forEach(t => {
        const chip = document.createElement('span');
        chip.className = 'teacher-chip';
        chip.textContent = t;
        chip.style.background = teacherColors[t] || '#777';
        wrapper.appendChild(chip);
      });
      return wrapper;
    }

    function renderCardContent(item){
      const [classText, teachersText] = item.label.split(' — ');
      const wrapper = document.createElement('div');
      const classLine = document.createElement('div');
      classLine.className = 'card_class';
      classLine.textContent = classText;
      wrapper.appendChild(classLine);
      if (teachersText) {
        wrapper.appendChild(createTeacherChips(teachersText));
      }
      return wrapper;
    }

    function renderSlotContent(id){
      const item = data.find(x => x.id === id);
      if (!item) return document.createElement('div');
      const [classText, teachersText] = item.label.split(' — ');
      const wrapper = document.createElement('div');
      wrapper.style.display = 'flex';
      wrapper.style.flexDirection = 'column';
      wrapper.style.alignItems = 'center';
      wrapper.style.width = '100%';
      const classSpan = document.createElement('div');
      classSpan.className = 'slot-class';
      classSpan.textContent = classText;
      wrapper.appendChild(classSpan);
      if (teachersText) {
        wrapper.appendChild(createTeacherChips(teachersText));
      }
      return wrapper;
    }

    function renderPool(){
      cardsEl.innerHTML = '';
      data.forEach(item => {
        if (used.has(item.id)) return;
        const d = document.createElement('div');
        d.className = 'card';
        d.draggable = true;
        d.dataset.id = item.id;
        d.appendChild(renderCardContent(item));
        d.addEventListener('dragstart', e => {
          e.dataTransfer.setData('text/plain', item.id);
          d.classList.add('dragging');
        });
        d.addEventListener('dragend', () => d.classList.remove('dragging'));
        cardsEl.appendChild(d);
      });
    }

    function updateCounts(){
      for (let r=0; r<rows; r++){
        const rowCountEl = document.querySelector(`[data-rowcount="${r}"]`);
        if (!rowCountEl) continue;
        const teacherCount = {};
        for (let c=0; c<cols; c++){
          const idx = r*cols + c;
          const itemId = slotMap[idx];
          if (itemId !== undefined) {
            const item = data.find(x => x.id === itemId);
            if (item) {
              const [_, teachersText] = item.label.split(' — ');
              if (teachersText) {
                const teachers = teachersText.split(', ');
                teachers.forEach(t => {
                  teacherCount[t] = (teacherCount[t] || 0) + 1;
                });
              }
            }
          }
        }
        let countStr = Object.entries(teacherCount).map(([t, c]) => `${t}:${c}`).join(' ');
        rowCountEl.textContent = countStr || '—';
      }
      
      for (let c=0; c<cols; c++){
        const colCountEl = document.querySelector(`[data-colcount="${c}"]`);
        if (!colCountEl) continue;
        const teacherCount = {};
        for (let r=0; r<rows; r++){
          const idx = r*cols + c;
          const itemId = slotMap[idx];
          if (itemId !== undefined) {
            const item = data.find(x => x.id === itemId);
            if (item) {
              const [_, teachersText] = item.label.split(' — ');
              if (teachersText) {
                const teachers = teachersText.split(', ');
                teachers.forEach(t => {
                  teacherCount[t] = (teacherCount[t] || 0) + 1;
                });
              }
            }
          }
        }
        let countStr = Object.entries(teacherCount).map(([t, c]) => `${t}:${c}`).join(' ');
        colCountEl.textContent = countStr || '—';
      }
    }

    function makeSlot(i){
      const s = document.createElement('div');
      s.className = 'slot';
      s.dataset.index = i;
      if (i === disabledIndex) {
        s.classList.add('disabled');
        s.textContent = 'vynecháno';
        s.style.opacity = '0.5';
        s.style.cursor = 'not-allowed';
        return s;
      }
      s.addEventListener('dragover', e => e.preventDefault());
      s.addEventListener('drop', e => {
        e.preventDefault();
        const id = parseInt(e.dataTransfer.getData('text/plain'));
        if (isNaN(id)) return;
        if (used.has(id)) {
          alert('Tato kartička už je v tabulce.');
          return;
        }
        placeCardInSlot(id, s);
      });
      s.addEventListener('click', () => {
        if (!s.dataset.cardId) return;
        const cid = parseInt(s.dataset.cardId);
        used.delete(cid);
        delete slotMap[i];
        s.dataset.cardId = '';
        s.classList.remove('filled');
        s.innerHTML = '';
        renderPool();
        updateCounts();
      });
      return s;
    }

    function placeCardInSlot(id, slotEl){
      if (slotEl.dataset.cardId) return;
      const item = data.find(x => x.id === id);
      if (!item) return;
      slotEl.innerHTML = '';
      slotEl.appendChild(renderSlotContent(id));
      slotEl.dataset.cardId = id;
      slotEl.classList.add('filled');
      const idx = parseInt(slotEl.dataset.index);
      slotMap[idx] = id;
      used.add(id);
      renderPool();
      updateCounts();
    }

    function init(){
      const timetable = document.getElementById('timetable');
      
      const corner = document.createElement('div');
      corner.className = 'corner';
      timetable.appendChild(corner);
      
      days.forEach(d => {
        const hd = document.createElement('div');
        hd.className = 'day';
        hd.textContent = d;
        timetable.appendChild(hd);
      });
      
      const rcHeader = document.createElement('div');
      rcHeader.className = 'colcount-header';
      timetable.appendChild(rcHeader);
      
      for (let r=0; r<rows; r++){
        const t = document.createElement('div');
        t.className = 'time';
        t.textContent = times[r] || '';
        timetable.appendChild(t);
        
        for (let c=0; c<cols; c++){
          const idx = r*cols + c;
          const slot = makeSlot(idx);
          timetable.appendChild(slot);
        }
        
        const rowCount = document.createElement('div');
        rowCount.className = 'rowcount';
        rowCount.dataset.rowcount = r;
        rowCount.textContent = '—';
        timetable.appendChild(rowCount);
      }
      
      const colCountCorner = document.createElement('div');
      colCountCorner.className = 'corner';
      timetable.appendChild(colCountCorner);
      
      for (let c=0; c<cols; c++){
        const colCount = document.createElement('div');
        colCount.className = 'colcount';
        colCount.dataset.colcount = c;
        colCount.textContent = '—';
        timetable.appendChild(colCount);
      }
      
      const colCountEnd = document.createElement('div');
      colCountEnd.className = 'corner';
      timetable.appendChild(colCountEnd);
      
      renderPool();
      document.getElementById('reset').addEventListener('click', () => {
        used.clear();
        slotMap = {};
        document.querySelectorAll('.slot').forEach(s => { 
          s.dataset.cardId=''; 
          s.classList.remove('filled'); 
          s.innerHTML = ''; 
        });
        renderPool();
        updateCounts();
      });
    }

    init();
  </script>
</body>
</html>
