<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Kartičky - drag & drop</title>
  <style>
    body{font-family: Arial, Helvetica, sans-serif; padding:20px}
    .layout{display:flex; flex-direction:column; gap:20px; align-items:center}
    .pool{width:860px; display:flex; flex-direction:column; gap:12px}
    #cards{display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-start}
    .card{padding:8px 12px; background:#f5f5f5; border:1px solid #ddd; cursor:grab; display:flex; flex-direction:column; gap:4px; width:160px; box-sizing:border-box}
    .card.dragging{opacity:0.5}
    .card_class{font-weight:bold; font-size:1rem}
    .card_teachers{font-size:0.9rem; color:#333}
    .timetable{display:grid; grid-template-columns: 120px repeat(5, 1fr); gap:8px; align-items:stretch; width:860px}
    .timetable .corner{background:transparent}
    .timetable .day{font-weight:bold; text-align:center}
    .timetable .time{font-weight:bold; display:flex; align-items:center; justify-content:center}
    .slots{display:contents}
    .slot{min-height:44px; border:2px dashed #ccc; display:flex; align-items:center; justify-content:center; background:#fff}
    .slot.filled{border-style:solid; background:#eef}
    .controls{margin-top:12px}
    button{padding:6px 10px}
  </style>
</head>
<body>
  <h2>Kartičky (přetáhněte do TABULKY)</h2>
  <div class="layout">
    <div>
      <h3>TABULKA</h3>
      <div class="timetable" id="timetable">
        <!-- generated by JS: corner, days, times and slots -->
      </div>
    </div>
    <div class="pool">
      <h3>Pool kartiček</h3>
      <div id="cards"></div>
      <div class="controls">
        <button id="reset">Resetovat</button>
      </div>
    </div>
  </div>

  <script>
    const data = JSON.parse('[{"id": 0, "label": "Ia \u2014 Up, Ne"}, {"id": 1, "label": "Ib \u2014 Bz, Rj"}, {"id": 2, "label": "IIa, IIb \u2014 Ne, Ga, Rj"}, {"id": 3, "label": "IIIa,IIIb \u2014 Ga, Bz, Ne"}, {"id": 4, "label": "IVa \u2014 Bz, Rj"}, {"id": 5, "label": "IVb \u2014 Bz, Rj"}, {"id": 6, "label": "Va \u2014 Bz, Rj"}, {"id": 7, "label": "Vb \u2014 Sf, Ne"}, {"id": 8, "label": "VIa \u2014 Bz, Rj"}, {"id": 9, "label": "VIb \u2014 Ga, Ne"}, {"id": 10, "label": "VIIa \u2014 Sf, Ka"}, {"id": 11, "label": "VIIb \u2014 Sf, Rj"}, {"id": 12, "label": "VIIIa, VIIIb \u2014 Up, Ga, Ne"}, {"id": 13, "label": "1a, 1b \u2014 Ga, Bz, Ne"}, {"id": 14, "label": "2a, 2b \u2014 Bz, Ga, Ne"}, {"id": 15, "label": "3a \u2014 Ka, Sf"}, {"id": 16, "label": "3b \u2014 Ga, Ne"}, {"id": 17, "label": "4a \u2014 Bz, Ne"}, {"id": 18, "label": "4b \u2014 Ka, Ne"}]');
    const cols = 5;
    const rows = 4;
    const slotCount = cols * rows; // 20
    const disabledIndex = slotCount - 1; // pravý dolní (Pátek, poslední čas) vynechat
    const days = ['Pondělí','Úterý','Středa','Čtvrtek','Pátek'];
    const times = ['1.-2.','3.-4.','5.-6.','7.-8.'];
    const cardsEl = document.getElementById('cards');
    const slotsEl = document.getElementById('slots');
    const used = new Set();

    function renderCardContent(item){
      const [classText, teachersText] = item.label.split(' — ');
      const wrapper = document.createElement('div');
      const classLine = document.createElement('div');
      classLine.className = 'card_class';
      classLine.textContent = classText;
      wrapper.appendChild(classLine);
      if (teachersText) {
        const teachersLine = document.createElement('div');
        teachersLine.className = 'card_teachers';
        teachersLine.textContent = teachersText;
        wrapper.appendChild(teachersLine);
      }
      return wrapper;
    }

    function renderPool(){
      cardsEl.innerHTML = '';
      data.forEach(item => {
        if (used.has(item.id)) return; // removed from pool
        const d = document.createElement('div');
        d.className = 'card';
        d.draggable = true;
        d.dataset.id = item.id;
        d.appendChild(renderCardContent(item));
        d.addEventListener('dragstart', e => {
          e.dataTransfer.setData('text/plain', item.id);
          d.classList.add('dragging');
        });
        d.addEventListener('dragend', () => d.classList.remove('dragging'));
        cardsEl.appendChild(d);
      });
    }

    function makeSlot(i){
      const s = document.createElement('div');
      s.className = 'slot';
      s.dataset.index = i;
      if (i === disabledIndex) {
        s.classList.add('disabled');
        s.textContent = 'vynecháno';
        s.style.opacity = '0.5';
        s.style.cursor = 'not-allowed';
        return s;
      }
      s.addEventListener('dragover', e => e.preventDefault());
      s.addEventListener('drop', e => {
        e.preventDefault();
        const id = parseInt(e.dataTransfer.getData('text/plain'));
        if (isNaN(id)) return;
        if (used.has(id)) {
          alert('Tato kartička už je v tabulce.');
          return;
        }
        placeCardInSlot(id, s);
      });
      s.addEventListener('click', () => {
        // remove
        if (!s.dataset.cardId) return;
        const cid = parseInt(s.dataset.cardId);
        used.delete(cid);
        s.dataset.cardId = '';
        s.classList.remove('filled');
        s.textContent = '';
        renderPool();
      });
      return s;
    }

    function placeCardInSlot(id, slotEl){
      // single card per slot
      if (slotEl.dataset.cardId) return;
      const item = data.find(x => x.id === id);
      if (!item) return;
      slotEl.innerHTML = '';
      slotEl.appendChild(renderCardContent(item));
      slotEl.dataset.cardId = id;
      slotEl.classList.add('filled');
      used.add(id);
      renderPool();
    }

    function init(){
      const timetable = document.getElementById('timetable');
      // top-left corner
      const corner = document.createElement('div'); corner.className='corner'; timetable.appendChild(corner);
      // day headers
      days.forEach(d => { const hd = document.createElement('div'); hd.className='day'; hd.textContent = d; timetable.appendChild(hd); });

      // rows: time header + slots
      for (let r=0;r<rows;r++){
        const t = document.createElement('div'); t.className='time'; t.textContent = times[r] || '';
        timetable.appendChild(t);
        for (let c=0;c<cols;c++){
          const idx = r*cols + c;
          const slot = makeSlot(idx);
          timetable.appendChild(slot);
        }
      }

      renderPool();
      document.getElementById('reset').addEventListener('click', () => {
        used.clear();
        document.querySelectorAll('.slot').forEach(s => { s.dataset.cardId=''; s.classList.remove('filled'); s.textContent=''; });
        renderPool();
      });
    }

    init();
  </script>
</body>
</html>
